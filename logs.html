<!DOCTYPE html>
<html>

<head>
  <title>Punishment Logs</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Sidebar */
    .sidebar {
      position: fixed;
      width: 220px;
      height: 100%;
      background: #020617;
      padding: 20px;
    }

    .sidebar h2 {
      color: #38bdf8;
      margin-bottom: 30px;
    }

    .sidebar a {
      display: block;
      color: white;
      text-decoration: none;
      margin: 15px 0;
      padding: 8px 12px;
      border-radius: 5px;
    }

    .sidebar a:hover {
      background: #1e293b;
      color: #38bdf8;
    }

    /* Main content */
    .main {
      margin-left: 240px;
      padding: 40px;
      background: #0f172a;
      min-height: 100vh;
    }

    h1 {
      color: #f8fafc;
      margin-bottom: 20px;
    }

    h2 {
      color: #38bdf8;
      margin: 30px 0 15px 0;
    }

    /* Cards for Form and Logs */
    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 30px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
    }

    iframe {
      border-radius: 8px;
      border: 1px solid #334155;
      width: 100%;
    }

    /* Optional: Responsive */
    @media (max-width: 768px) {
      .sidebar {
        width: 100%;
        height: auto;
        position: relative;
      }

      .main {
        margin-left: 0;
        padding: 20px;
      }
    }
  </style>
</head>

<body>

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>NYCRPX</h2>
    <a href="index.html">Dashboard</a>
    <a href="logs.html">Punishment Logs</a>
    <a href="loa.html">LOA Requests</a>
    <a href="docs.html">Documents</a>
  </div>

  <!-- Main Content -->
  <div class="main">
    <h1>Punishment Logs</h1>

    <!-- Submit Form Card -->
    <h2>Submit a Punishment</h2>
    <div class="card">
      <iframe 
        src="https://docs.google.com/forms/d/e/1FAIpQLSd2nNX0VOd-Gs3pvi4Z2b-U8RyQ4QaoU_lh7eT6Vvx5wiY8dQ/viewform?usp=publish-editor" 
        height="700"
        marginheight="0" marginwidth="0"
        frameborder="0">
      Loading…
      </iframe>
    </div>

    <!-- Live Logs Card -->
    <h2>Live Punishment Logs</h2>
    <div class="card">
      <iframe 
        src="https://docs.google.com/spreadsheets/d/e/2PACX-1vT3Cvthhbvg7Ta6sz59JjmQs3r8M3OsecJAno1cebeNb4VPlBrYbqhuMpXEeIg1sRzvsET8AUxV1CnB/pubhtml" 
        height="600"
        frameborder="0">
      Loading…
      </iframe>
    </div>

  </div>

</body>
<div class="navBar">
<a href="index.html">Dashboard</a>
</div>
</html>
