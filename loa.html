<!DOCTYPE html>
<html>

<head>
<title>NYCRPX Staff Portal - LOA</title>

<style>
body{
font-family:Arial;
background:#0f172a;
margin:0;
color:white;
}

.card{
background:linear-gradient(135deg,#005f99,#00aaff);
padding:30px;
border-radius:14px;
box-shadow:0 10px 25px rgba(0,0,0,.6);
max-width:600px;
margin:80px auto;
text-align:center;
}

input,textarea{
width:90%;
margin:10px 0;
padding:12px;
border-radius:8px;
border:none;
font-size:15px;
}

button{
width:95%;
padding:12px;
background:#00d0ff;
color:#001529;
font-weight:bold;
border:none;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#0080cc;
color:white;
}

#loginBtn{
display:inline-block;
padding:14px 30px;
background:#00d0ff;
color:#001529;
font-weight:bold;
border-radius:8px;
text-decoration:none;
}

#loginBtn:hover{
background:#0080cc;
color:white;
}
</style>
</head>

<body>

<div id="loginDiv" class="card">

<h2>Staff Login Required</h2>
<p>Please login with Discord to submit an LOA.</p>

<a id="loginBtn"
href="https://discord.com/oauth2/authorize?client_id=1483061297699360818&redirect_uri=https%3A%2F%2Fwirvi10-rgb.github.io%2FNYCRPX-STAFF-PORTAL%2Floa.html&response_type=token&scope=identify">
Login with Discord
</a>

</div>

<div id="formDiv" class="card" style="display:none;">

<h2>Submit LOA Request</h2>

<form id="loaForm">

<input type="text" id="name" placeholder="Staff Name" required>

<label>Start Date</label>
<input type="date" id="start" required>

<label>End Date</label>
<input type="date" id="end" required>

<textarea id="reason" placeholder="Reason for LOA" required></textarea>

<button type="submit">Submit LOA</button>

</form>

</div>

<script>

function getToken(){
const hash = window.location.hash
if(!hash) return null
const params = new URLSearchParams(hash.substring(1))
return params.get("access_token")
}

const token = getToken()

if(token){

localStorage.setItem("discord_token",token)

/* remove token from URL */
window.location.href = window.location.pathname

}

const savedToken = localStorage.getItem("discord_token")

const loginDiv = document.getElementById("loginDiv")
const formDiv = document.getElementById("formDiv")

if(savedToken){

loginDiv.style.display="none"
formDiv.style.display="block"

}else{

loginDiv.style.display="block"
formDiv.style.display="none"

}

/* webhook submit */

const form = document.getElementById("loaForm")

form.addEventListener("submit", async (e)=>{

e.preventDefault()

const name=document.getElementById("name").value
const start=document.getElementById("start").value
const end=document.getElementById("end").value
const reason=document.getElementById("reason").value

const webhook="PASTE_WEBHOOK_URL_HERE"

const data={
content:
"📋 **NEW LOA REQUEST**\n"+
"👤 Staff: "+name+"\n"+
"📅 Start: "+start+"\n"+
"📅 End: "+end+"\n"+
"📝 Reason: "+reason
}

await fetch(webhook,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
})

alert("LOA request sent!")

form.reset()

})

</script>

</body>
<div class="navBar">
<a href="index.html">Dashboard</a>
</div>
</html>
