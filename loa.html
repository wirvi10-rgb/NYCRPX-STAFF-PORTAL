<!DOCTYPE html>
<html>

<head>
  <title>LOA Requests - NYCRPX</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Card styling for LOA form */
    .card {
      background: linear-gradient(135deg, #005f99, #00aaff);
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.6);
      color: #fff;
      max-width: 600px;
      margin: 50px auto;
      text-align: center;
    }

    .card input,
    .card textarea,
    .card button {
      width: 90%;
      margin: 10px 0;
      padding: 12px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }

    .card button {
      background: #00d0ff;
      color: #001529;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .card button:hover {
      background: #0080cc;
      color: #fff;
    }

    #loginBtn {
      display: inline-block;
      padding: 12px 25px;
      background: #00d0ff;
      color: #001529;
      font-weight: bold;
      border-radius: 8px;
      text-decoration: none;
      transition: 0.3s;
    }

    #loginBtn:hover {
      background: #0080cc;
      color: #fff;
    }
  </style>
</head>

<body>

  <!-- Login Div (shows if user is not logged in) -->
  <a id="loginBtn" href="https://discord.com/oauth2/authorize?client_id=1483061297699360818&redirect_uri=https%3A%2F%2Fwirvi10-rgb.github.io%2FNYCRPX-STAFF-PORTAL%2Floa.html&response_type=token&scope=identify">
  Login with Discord
</a>

  <!-- LOA Form Div (hidden until login) -->
  <div id="formDiv" class="card" style="display:none;">
    <h2>Submit LOA Request</h2>
    <form id="loaForm">
      <input type="text" name="name" placeholder="Staff Name" required>
      <input type="date" name="start" required>
      <input type="date" name="end" required>
      <textarea name="reason" placeholder="Reason" required></textarea>
      <button type="submit">Submit LOA</button>
    </form>
  </div>

  <script>
// Function to get access token from URL
function getAccessToken() {
  const hash = window.location.hash;
  if (!hash) return null;

  const params = new URLSearchParams(hash.substring(1));
  return params.get("access_token");
}

const token = getAccessToken();

if (token) {
  // Save login so refresh keeps you logged in
  localStorage.setItem("discord_token", token);
}

// Check stored login
const savedToken = localStorage.getItem("discord_token");

if (savedToken) {
  document.getElementById("loginDiv").style.display = "none";
  document.getElementById("formDiv").style.display = "block";
} else {
  document.getElementById("loginDiv").style.display = "block";
  document.getElementById("formDiv").style.display = "none";
}
</script>
    
</body>
</html>
